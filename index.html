<!DOCTYPE html>
<html>
<head>

</head>

      <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png" class="avatar">

        <p>Learn coding skills</p>
      </div>

      <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/1055/1055687.png" class="avatar">

      </div>

    </div>
